<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8"/>
	<title>Server state</title>
</head>
<body>
<main>
	<input type="range" min="-4095" max="4095" step="1" oninput="move(this.value)">
	<button onclick="disable()">Disable</button>
</main>
<script>
	const ws = new WebSocket('ws://192.168.1.11:3014');

	// Handle incoming messages from the server
	ws.onmessage = (event) => {
		const message = JSON.parse(event.data);

		switch (message.type) {
			case 'state':
				// Update the Vue store object with new state data
				break;
			default:
				console.log(`Unknown message type: ${message.type}`);
		}
	};

	// Define a method to send update messages to the server
	function sendUpdate(variable, value) {
		ws.send(JSON.stringify({type: 'update', variable, value}));
	}

	// Define a method to increment the count variable in the Vue store
	function move(position) {
		sendUpdate('motors/0/torque', 8);
		sendUpdate('motors/0/position', position);
	}

	function disable() {
		sendUpdate('motors/0/enabled', false);
	}
</script>
</body>
</html>
